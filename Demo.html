<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>YusufAI - Multi AI Platform</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

:root{
    --bg:#0f172a;
    --sidebar:#111827;
    --card:#1e293b;
    --card2:#334155;
    --text:#f8fafc;
    --muted:#94a3b8;
    --border:#334155;
    --primary:#7c3aed;
    --primary2:#9333ea;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Inter',sans-serif;
    background:linear-gradient(135deg,#0f172a,#111827);
    color:var(--text);
    height:100vh;
    overflow:hidden;
}

.container{
    display:flex;
    height:100vh;
}

/* SIDEBAR */

.sidebar{
    width:300px;
    background:rgba(15,23,42,.95);
    border-right:1px solid var(--border);
    padding:20px;
    display:flex;
    flex-direction:column;
    backdrop-filter:blur(20px);
}

.logo{
    font-size:32px;
    font-weight:800;
    text-align:center;
    margin-bottom:20px;
    background:linear-gradient(135deg,#8b5cf6,#ec4899);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.top-buttons{
    display:flex;
    gap:10px;
    margin-bottom:15px;
}

.top-btn{
    flex:1;
    border:none;
    background:var(--card);
    color:white;
    padding:12px;
    border-radius:12px;
    cursor:pointer;
    font-size:18px;
}

.top-btn:hover{
    background:var(--card2);
}

.new-chat{
    width:100%;
    padding:15px;
    border:none;
    border-radius:14px;
    margin-bottom:20px;
    background:linear-gradient(135deg,#7c3aed,#9333ea);
    color:white;
    font-weight:700;
    cursor:pointer;
    font-size:15px;
}

.new-chat:hover{
    transform:scale(1.02);
}

.ai-list{
    display:flex;
    flex-direction:column;
    gap:10px;
}

.ai-btn{
    width:100%;
    border:none;
    background:var(--card);
    color:white;
    padding:14px;
    border-radius:14px;
    cursor:pointer;
    display:flex;
    align-items:center;
    gap:12px;
    font-size:15px;
    font-weight:600;
    transition:.2s;
}

.ai-btn:hover{
    background:var(--card2);
}

.ai-btn.active{
    background:linear-gradient(135deg,#7c3aed,#9333ea);
}

.ai-icon{
    width:36px;
    height:36px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:18px;
}

/* MAIN */

.main{
    flex:1;
    display:flex;
    flex-direction:column;
}

.header{
    height:80px;
    border-bottom:1px solid var(--border);
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 30px;
    background:rgba(15,23,42,.7);
    backdrop-filter:blur(20px);
}

.header-left{
    display:flex;
    align-items:center;
    gap:15px;
}

.ai-name{
    font-size:22px;
    font-weight:700;
}

.status{
    background:#10b981;
    color:white;
    padding:6px 14px;
    border-radius:20px;
    font-size:13px;
    font-weight:700;
}

.messages{
    flex:1;
    overflow-y:auto;
    padding:30px;
}

.welcome{
    text-align:center;
    margin-top:100px;
}

.welcome h1{
    font-size:50px;
    margin-bottom:15px;
}

.welcome p{
    color:var(--muted);
    font-size:18px;
}

.message{
    display:flex;
    gap:12px;
    margin-bottom:24px;
}

.message.user{
    justify-content:flex-end;
}

.avatar{
    width:42px;
    height:42px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:18px;
    flex-shrink:0;
}

.user .avatar{
    background:linear-gradient(135deg,#7c3aed,#9333ea);
}

.ai .avatar{
    background:var(--card);
}

.bubble{
    max-width:70%;
    padding:18px;
    border-radius:18px;
    line-height:1.7;
    white-space:pre-wrap;
}

.user .bubble{
    background:linear-gradient(135deg,#7c3aed,#9333ea);
}

.ai .bubble{
    background:var(--card);
}

.input-area{
    padding:25px;
    border-top:1px solid var(--border);
    background:rgba(15,23,42,.7);
}

.input-box{
    display:flex;
    gap:12px;
}

.input-box input{
    flex:1;
    border:none;
    background:var(--card);
    color:white;
    padding:18px 22px;
    border-radius:40px;
    font-size:15px;
}

.input-box input:focus{
    outline:none;
}

.send-btn{
    border:none;
    padding:18px 28px;
    border-radius:40px;
    cursor:pointer;
    font-weight:700;
    color:white;
    background:linear-gradient(135deg,#7c3aed,#9333ea);
}

.send-btn:hover{
    transform:scale(1.04);
}

@media(max-width:800px){

    .sidebar{
        display:none;
    }

    .bubble{
        max-width:90%;
    }

}

</style>
</head>
<body>

<div class="container">

    <div class="sidebar">

        <div class="logo">🤖 YusufAI</div>

        <div class="top-buttons">
            <button class="top-btn" onclick="toggleTheme()">🌙</button>
            <button class="top-btn" onclick="clearChat()">🗑️</button>
            <button class="top-btn" onclick="showInfo()">📊</button>
        </div>

        <button class="new-chat" onclick="newChat()">
            ➕ Yangi suhbat
        </button>

        <div class="ai-list">

            <button class="ai-btn active" data-ai="gpt4" onclick="selectAI('gpt4')">
                <div class="ai-icon" style="background:#10a37f;">🤖</div>
                ChatGPT-4
            </button>

            <button class="ai-btn" data-ai="claude" onclick="selectAI('claude')">
                <div class="ai-icon" style="background:#CC785C;">🎭</div>
                Claude 3.5
            </button>

            <button class="ai-btn" data-ai="gemini" onclick="selectAI('gemini')">
                <div class="ai-icon" style="background:#4285F4;">💎</div>
                Gemini Pro
            </button>

            <button class="ai-btn" data-ai="groq" onclick="selectAI('groq')">
                <div class="ai-icon" style="background:#F55036;">⚡</div>
                Groq Llama
            </button>

        </div>

    </div>

    <div class="main">

        <div class="header">

            <div class="header-left">
                <div class="ai-name" id="aiName">ChatGPT-4</div>
                <div class="status">🟢 Online</div>
            </div>

            <div>
                🌍 500+ Til
            </div>

        </div>

        <div class="messages" id="messages">

            <div class="welcome">
                <h1>YusufAI</h1>
                <p>ChatGPT • Claude • Gemini • Groq</p>
            </div>

        </div>

        <div class="input-area">

            <div class="input-box">

                <input
                    type="text"
                    id="input"
                    placeholder="Savolingizni yozing..."
                >

                <button class="send-btn" onclick="sendMessage()">
                    Yuborish
                </button>

            </div>

        </div>

    </div>

</div>

<script>

const AI_NAMES = {
    gpt4:'ChatGPT-4',
    claude:'Claude 3.5',
    gemini:'Gemini Pro',
    groq:'Groq Llama'
};

let currentAI = 'gpt4';

function selectAI(ai){

    currentAI = ai;

    document.querySelectorAll('.ai-btn')
    .forEach(btn => btn.classList.remove('active'));

    document.querySelector(`[data-ai="${ai}"]`)
    .classList.add('active');

    document.getElementById('aiName').innerText =
    AI_NAMES[ai];
}

function sendMessage(){

    const input = document.getElementById('input');

    const text = input.value.trim();

    if(!text) return;

    addMessage('user',text);

    input.value='';

    setTimeout(()=>{

        const reply = generateAI(text);

        addMessage('ai',reply);

    },700);
}

function addMessage(role,text){

    const messages = document.getElementById('messages');

    const div = document.createElement('div');

    div.className = `message ${role}`;

    const icon = role === 'user'
        ? '👤'
        : (
            currentAI==='gpt4' ? '🤖' :
            currentAI==='claude' ? '🎭' :
            currentAI==='gemini' ? '💎' :
            '⚡'
        );

    div.innerHTML = `
        ${role==='ai'
            ? `<div class="avatar">${icon}</div>`
            : ''
        }

        <div class="bubble">${text}</div>

        ${role==='user'
            ? `<div class="avatar">${icon}</div>`
            : ''
        }
    `;

    messages.appendChild(div);

    messages.scrollTop = 999999;
}

function generateAI(msg){

    const text = msg.toLowerCase();

    if(text.includes('salom')){

        return `Assalomu alaykum!

Men ${AI_NAMES[currentAI]} modeliman.
Sizga qanday yordam bera olaman?`;
    }

    if(
        text.includes('python') ||
        text.includes('kod')
    ){

        return `Python dasturlash tili juda mashhur.

Misol:

print("Hello World")

Python:
• Web
• AI
• Bot
• O'yin
uchun ishlatiladi.`;
    }

    if(
        text.includes('matematika') ||
        text.includes('math')
    ){

        return `Matematika misoli:

2x + 5 = 15

2x = 10
x = 5`;
    }

    if(
        text.includes('o\'zbekiston')
    ){

        return `🇺🇿 O‘zbekiston:

Poytaxt: Toshkent
Valyuta: So‘m
Til: O‘zbek tili`;
    }

    if(
        text.includes('she')
    ){

        return `🌙

Tun jim bo‘lib qolganida,
Yulduzlar ham uxlaydi.
Orzularing ortidan yur,
Bir kun bari bo‘ladi.`;
    }

    return `${AI_NAMES[currentAI]} javobi:

"${msg}" haqida yordam bera olaman.`;
}

document
.getElementById('input')
.addEventListener('keypress',e=>{

    if(e.key==='Enter'){

        sendMessage();
    }
});

function toggleTheme(){

    document.body.classList.toggle('light');
}

function clearChat(){

    document.getElementById('messages').innerHTML=`
        <div class="welcome">
            <h1>YusufAI</h1>
            <p>ChatGPT • Claude • Gemini • Groq</p>
        </div>
    `;
}

function newChat(){

    clearChat();
}

function showInfo(){

    alert(`
YusufAI Platform

• ChatGPT-4
• Claude 3.5
• Gemini Pro
• Groq

🚀 Muhammad Yusuf tomonidan yaratilgan
    `);
}

</script>

</body>
</html>
