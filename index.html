<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YusufAI Multi-AI Chat</title>
<style>
body { font-family: Arial; background: #667eea; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; }
.chat-container { background: rgba(0,0,0,0.2); padding: 20px; border-radius: 10px; width: 400px; }
.messages { max-height: 300px; overflow-y: auto; margin-bottom: 10px; }
.message { margin: 5px 0; padding: 5px 10px; border-radius: 5px; }
.user { background: #fbbf24; color: black; text-align: right; }
.ai { background: #1e3a8a; color: white; text-align: left; }
</style>
</head>
<body>
<div class="chat-container">
    <div class="messages" id="messages"></div>
    <input type="text" id="input" placeholder="Salom deb yozing..." />
    <select id="ai-select">
        <option value="openai">OpenAI GPT</option>
        <option value="claude">Claude</option>
    </select>
    <button onclick="sendMessage()">Jo'nat</button>
</div>

<script>
const messages = document.getElementById('messages');
const input = document.getElementById('input');
const aiSelect = document.getElementById('ai-select');

function addMessage(text, sender) {
    const div = document.createElement('div');
    div.className = `message ${sender}`;
    div.textContent = text;
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
}

async function sendMessage() {
    const msg = input.value.trim();
    if (!msg) return;
    addMessage(msg, 'user');
    input.value = '';

    const ai = aiSelect.value;
    try {
        const res = await fetch('/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: msg, ai })
        });
        const data = await res.json();
        addMessage(data.reply, 'ai');
    } catch (err) {
        addMessage("Server bilan bog'lanishda xatolik yuz berdi", 'ai');
    }
}
</script>
</body>
</html>
