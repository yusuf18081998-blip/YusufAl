<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YusufAI - Universal AI Platform</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {margin: 0; padding: 0; box-sizing: border-box;}
        
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            overflow: hidden;
        }
        
        .container {
            display: flex;
            height: 100vh;
        }
        
        /* Sidebar */
        .sidebar {
            width: 280px;
            background: rgba(255, 255, 255, 0.98);
            padding: 20px;
            box-shadow: 2px 0 20px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
        }
        
        .logo {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 30px;
            text-align: center;
        }
        
        .ai-selector {
            margin-bottom: 20px;
        }
        
        .ai-button {
            width: 100%;
            padding: 15px;
            margin-bottom: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            background: white;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 15px;
            font-weight: 600;
        }
        
        .ai-button:hover {
            border-color: #667eea;
            transform: translateX(5px);
        }
        
        .ai-button.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border-color: transparent;
        }
        
        .ai-icon {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }
        
        .new-chat {
            padding: 15px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            margin-bottom: 20px;
            font-size: 15px;
        }
        
        .history {
            flex: 1;
            overflow-y: auto;
        }
        
        .history-item {
            padding: 12px;
            margin-bottom: 8px;
            background: #f5f5f5;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
        }
        
        .history-item:hover {
            background: #e0e0e0;
        }
        
        .history-item.active {
            background: #667eea;
            color: white;
        }
        
        /* Main Chat */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: rgba(255, 255, 255, 0.95);
        }
        
        .header {
            padding: 20px 30px;
            background: white;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .ai-name {
            font-size: 20px;
            font-weight: 700;
            color: #667eea;
        }
        
        .stats {
            font-size: 14px;
            color: #666;
        }
        
        .messages {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
        }
        
        .message {
            margin-bottom: 24px;
            display: flex;
            gap: 12px;
        }
        
        .message.user {
            justify-content: flex-end;
        }
        
        .message-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }
        
        .user .message-avatar {
            background: linear-gradient(135deg, #667eea, #764ba2);
        }
        
        .ai .message-avatar {
            background: #f0f0f0;
        }
        
        .message-content {
            max-width: 70%;
            padding: 16px 20px;
            border-radius: 16px;
            line-height: 1.6;
            font-size: 15px;
        }
        
        .user .message-content {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border-bottom-right-radius: 4px;
        }
        
        .ai .message-content {
            background: #f5f5f5;
            color: #333;
            border-bottom-left-radius: 4px;
        }
        
        .input-area {
            padding: 25px 30px;
            background: white;
            border-top: 1px solid #e0e0e0;
        }
        
        .input-container {
            display: flex;
            gap: 12px;
            max-width: 900px;
            margin: 0 auto;
        }
        
        .input-container input {
            flex: 1;
            padding: 16px 24px;
            border: 2px solid #e0e0e0;
            border-radius: 30px;
            font-size: 15px;
            font-family: 'Inter', sans-serif;
        }
        
        .input-container input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .send-btn {
            padding: 16px 32px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            font-size: 15px;
        }
        
        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .loading {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #667eea;
            animation: pulse 1.5s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }
        
        .welcome {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }
        
        .welcome h2 {
            font-size: 32px;
            margin-bottom: 16px;
            color: #333;
        }
        
        .welcome p {
            font-size: 16px;
            margin-bottom: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <div class="logo">🤖 YusufAI</div>
            
            <button class="new-chat" onclick="newChat()">➕ Yangi Suhbat</button>
            
            <div class="ai-selector">
                <button class="ai-button active" onclick="selectAI('gpt4')" data-ai="gpt4">
                    <div class="ai-icon" style="background: #10a37f;">🤖</div>
                    ChatGPT-4
                </button>
                <button class="ai-button" onclick="selectAI('claude')" data-ai="claude">
                    <div class="ai-icon" style="background: #CC785C;">🎭</div>
                    Claude 3.5
                </button>
                <button class="ai-button" onclick="selectAI('gemini')" data-ai="gemini">
                    <div class="ai-icon" style="background: #4285F4;">💎</div>
                    Gemini Pro
                </button>
                <button class="ai-button" onclick="selectAI('groq')" data-ai="groq">
                    <div class="ai-icon" style="background: #F55036;">⚡</div>
                    Groq (Llama)
                </button>
            </div>
            
            <div class="history" id="chatHistory"></div>
        </div>
        
        <div class="main">
            <div class="header">
                <div class="ai-name" id="currentAI">ChatGPT-4</div>
                <div class="stats">500+ Til | Cheksiz Imkoniyatlar</div>
            </div>
            
            <div class="messages" id="messages">
                <div class="welcome">
                    <h2>YusufAI - Universal Platform</h2>
                    <p>✨ 4 ta eng kuchli AI bir joyda</p>
                    <p>🌍 500+ til qo'llab-quvvatlaydi</p>
                    <p>💬 Bepul va cheksiz</p>
                    <p>🚀 Muhammad Yusuf tomonidan yaratilgan</p>
                </div>
            </div>
            
            <div class="input-area">
                <div class="input-container">
                    <input 
                        type="text" 
                        id="messageInput" 
                        placeholder="Savolingizni yozing..."
                        onkeypress="if(event.key==='Enter') sendMessage()"
                    >
                    <button class="send-btn" id="sendBtn" onclick="sendMessage()">Yuborish</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_KEYS = {
            gpt4: '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',
            claude: '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',
            gemini: 'AIzaSyAlEG66c-IpjpinING_8HABwBt22pes3no',
            groq: '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'
        };

        const AI_NAMES = {
            gpt4: 'ChatGPT-4',
            claude: 'Claude 3.5',
            gemini: 'Gemini Pro',
            groq: 'Groq (Llama 3.3)'
        };

        let currentAI = 'gpt4';
        let currentChat = null;
        let chats = JSON.parse(localStorage.getItem('yusufai_all_chats') || '[]');

        function selectAI(ai) {
            currentAI = ai;
            document.querySelectorAll('.ai-button').forEach(btn => {
                btn.classList.remove('active');
            });
            document.querySelector(`[data-ai="${ai}"]`).classList.add('active');
            document.getElementById('currentAI').textContent = AI_NAMES[ai];
        }

        function newChat() {
            currentChat = {
                id: Date.now(),
                ai: currentAI,
                title: 'Yangi Suhbat',
                messages: [],
                created: new Date().toISOString()
            };
            chats.unshift(currentChat);
            saveChats();
            renderHistory();
            renderMessages();
        }

        function selectChat(id) {
            currentChat = chats.find(c => c.id === id);
            currentAI = currentChat.ai;
            selectAI(currentAI);
            renderHistory();
            renderMessages();
        }

        function saveChats() {
            localStorage.setItem('yusufai_all_chats', JSON.stringify(chats));
        }

        function renderHistory() {
            const html = chats.map(chat => 
                `<div class="history-item ${chat.id === (currentChat?.id || 0) ? 'active' : ''}" onclick="selectChat(${chat.id})">
                    <div style="font-weight: 600; margin-bottom: 4px;">${chat.title}</div>
                    <div style="font-size: 12px; opacity: 0.7;">${AI_NAMES[chat.ai]}</div>
                </div>`
            ).join('');
            document.getElementById('chatHistory').innerHTML = html;
        }

        function renderMessages() {
            if (!currentChat || currentChat.messages.length === 0) {
                document.getElementById('messages').innerHTML = `
                    <div class="welcome">
                        <h2>YusufAI - Universal Platform</h2>
                        <p>✨ 4 ta eng kuchli AI bir joyda</p>
                        <p>🌍 500+ til qo'llab-quvvatlaydi</p>
                        <p>💬 Bepul va cheksiz</p>
                        <p>🚀 Muhammad Yusuf tomonidan yaratilgan</p>
                    </div>
                `;
                return;
            }

            const html = currentChat.messages.map(msg => `
                <div class="message ${msg.role}">
                    ${msg.role === 'ai' ? `<div class="message-avatar">${getAIEmoji(currentChat.ai)}</div>` : ''}
                    <div class="message-content">${msg.content}</div>
                    ${msg.role === 'user' ? '<div class="message-avatar">👤</div>' : ''}
                </div>
            `).join('');
            
            document.getElementById('messages').innerHTML = html;
            document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
        }

        function getAIEmoji(ai) {
            const emojis = {gpt4: '🤖', claude: '🎭', gemini: '💎', groq: '⚡'};
            return emojis[ai] || '🤖';
        }

        async function sendMessage() {
            if (!currentChat) newChat();
            
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            if (!message) return;

            currentChat.messages.push({role: 'user', content: message});
            if (currentChat.messages.length === 1) {
                currentChat.title = message.substring(0, 40) + (message.length > 40 ? '...' : '');
            }

            input.value = '';
            renderMessages();
            renderHistory();

            const sendBtn = document.getElementById('sendBtn');
            sendBtn.disabled = true;
            sendBtn.innerHTML = '<span class="loading"></span> Javob kutilmoqda...';

            try {
                const response = await getAIResponse(currentAI, message);
                currentChat.messages.push({role: 'ai', content: response});
                saveChats();
                renderMessages();
            } catch (error) {
                console.error('Error:', error);
                currentChat.messages.push({
                    role: 'ai',
                    content: '❌ Xatolik yuz berdi. Iltimos, qayta urinib ko\'ring.'
                });
                renderMessages();
            }

            sendBtn.disabled = false;
            sendBtn.textContent = 'Yuborish';
        }

        async function getAIResponse(ai, message) {
            switch(ai) {
                case 'gpt4':
                    return await callOpenAI(message);
                case 'claude':
                    return await callClaude(message);
                case 'gemini':
                    return await callGemini(message);
                case 'groq':
                    return await callGroq(message);
            }
        }

        async function callOpenAI(message) {
            const res = await fetch('https://api.openai.com/v1/chat/completions', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${API_KEYS.gpt4}`
                },
                body: JSON.stringify({
                    model: 'gpt-4',
                    messages: [{role: 'user', content: message}],
                    max_tokens: 1000
                })
            });
            const data = await res.json();
            return data.choices[0].message.content;
        }

        async function callClaude(message) {
            const res = await fetch('https://api.anthropic.com/v1/messages', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'x-api-key': API_KEYS.claude,
                    'anthropic-version': '2023-06-01'
                },
                body: JSON.stringify({
                    model: 'claude-3-5-sonnet-20241022',
                    max_tokens: 1000,
                    messages: [{role: 'user', content: message}]
                })
            });
            const data = await res.json();
            return data.content[0].text;
        }

        async function callGemini(message) {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${API_KEYS.gemini}`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    contents: [{parts: [{text: message}]}]
                })
            });
            const data = await res.json();
            return data.candidates[0].content.parts[0].text;
        }

        async function callGroq(message) {
            const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${API_KEYS.groq}`
                },
                body: JSON.stringify({
                    model: 'llama-3.3-70b-versatile',
                    messages: [{role: 'user', content: message}],
                    max_tokens: 1000
                })
            });
            const data = await res.json();
            return data.choices[0].message.content;
        }

        // Initialize
        renderHistory();
        if (chats.length > 0) {
            currentChat = chats[0];
            currentAI = currentChat.ai;
            selectAI(currentAI);
            renderMessages();
        }
    </script>
</body>
</html>
